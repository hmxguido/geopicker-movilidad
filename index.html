<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de transporte</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    padding: 30px;
    text-align: center;
}
</style>
</head>

<body>

<h2>Obteniendo ubicación…</h2>
<p>Por favor permite el acceso a tu ubicación para continuar con el registro.</p>

<script>
const params = new URLSearchParams(window.location.search);
const codigo = params.get("camion");

const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdLkXHPMtOxG20LfXdWPzOIea9bHudZtsyWv1_8MYwZWjygpg/viewform";

if (!codigo) {
    document.body.innerHTML = `
        <h2>Error</h2>
        <p>No se encontró el código del transporte en el QR.</p>
    `;
} else if (!navigator.geolocation) {
    document.body.innerHTML = `
        <h2>Error</h2>
        <p>Este dispositivo no permite obtener ubicación GPS.</p>
    `;
} else {
    navigator.geolocation.getCurrentPosition(
        function(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;

            const query = new URLSearchParams({
                "usp": "pp_url",
                "entry.786665857": codigo,
                "entry.2008102927": `${lat},${lon}`
            });

            window.location.href = `${formURL}?${query.toString()}`;
        },
        function(err) {
            document.body.innerHTML = `
                <h2>No se pudo obtener la ubicación</h2>
                <p>Activa el GPS y permite el acceso a la ubicación.</p>
                <p>Después vuelve a escanear el QR.</p>
            `;
        },
        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        }
    );
}
</script>

</body>
</html>
